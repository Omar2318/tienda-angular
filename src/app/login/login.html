<div class="min-h-dvh flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-semibold text-gray-800 text-center mb-6">
      Iniciar sesión
    </h2>

    <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="login()">

      <!-- Email -->
      <div class="flex flex-col">
        <label class="text-sm text-gray-600 mb-1">Email</label>
        <input type="email" formControlName="email"
          class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
          [class.border-red-500]="emailInvalid">

        @if (emailInvalid) {
        <span class="text-red-500 text-xs mt-1">
          Email inválido
        </span>
        }
      </div>

      <!-- Password -->
      <div class="flex flex-col">
        <label class="text-sm text-gray-600 mb-1">Contraseña</label>

        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            [class.border-red-500]="passwordInvalid">

          <button type="button" (click)="togglePassword()" class="absolute right-3 top-2 text-sm text-gray-500">
            {{ showPassword ? 'Ocultar' : 'Ver' }}
          </button>
        </div>

        @if (passwordInvalid) {
        <span class="text-red-500 text-xs mt-1">
          Contraseña inválida
        </span>
        }
      </div>

      <!-- Botón -->
      <button type="submit" [disabled]="isLoading"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50">
        Entrar
      </button>

      <p class="text-sm text-center text-gray-500">
        ¿No tienes cuenta?
        <a href="#" class="text-blue-600 hover:underline">Regístrate</a>
      </p>

    </form>
  </div>
</div>
